<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Контакти - Irish Country Products</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

/* HEADER */
header {
  background:#7a0000;
  color:white;
  padding:20px;
  text-align:center;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}

/* SECTION */
.contact-section {
  max-width:1100px;
  margin:50px auto;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
}

/* LEFT SIDE */
.contact-info {
  flex:1;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contact-info h2 {
  margin-top:0;
  color:#7a0000;
}

.contact-info p {
  font-size:16px;
  margin:10px 0;
}

/* BUTTONS */
.button {
  display:inline-block;
  margin-top:10px;
  padding:12px 20px;
  background:#7a0000;
  color:white;
  text-decoration:none;
  border-radius:6px;
}

.button:hover {
  background:#a00000;
}

/* RIGHT SIDE MAP */
.map {
  flex:1;
  position:relative;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.map iframe {
  width:100%;
  height:100%;
  min-height:400px;
  border:0;
}

/* clickable overlay */
.map a {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:2;
}

/* MOBILE */
@media (max-width:768px) {
  .contact-section {
    flex-direction:column;
  }
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

  </nav>
</header>

 src="<iframe src="https://www.google.com/maps/embed?..."></iframe>"
