<!DOCTYPE html>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: white;
  color: #111;
}

/* HEADER */
header {
  background: white;
  border-bottom: 1px solid #eee;
  padding: 20px;
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

.top-bar nav a {
  color: black;
  margin: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 17px;
}

.top-bar nav a:hover {
  text-decoration: underline;
}

/* SECTION */
.contact-section {
  max-width: 1100px;
  margin: 50px auto;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

/* LEFT */
.contact-info {
  flex: 1;
  min-width: 280px;
  background: white;
  padding: 25px;
  border: 1px solid #eee;
  border-radius: 10px;
}

.contact-info h2 {
  margin-top: 0;
}

.contact-info p {
  margin: 10px 0;
}

/* BUTTON */
.button {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  border: 1px solid black;
  color: black;
  text-decoration: none;
  border-radius: 6px;
}

.button:hover {
  background: black;
  color: white;
}

/* MAP */
.map {
  flex: 1;
  min-width: 280px;
}

.map iframe {
  width: 100%;
  height: 400px;
  border: 0;
  border-radius: 10px;
}

/* FOOTER */
footer {
  background: white;
  color: black;
  text-align: center;
  padding: 20px;
  border-top: 1px solid #eee;
  margin-top: 40px;
}

/* MOBILE */
@media (max-width: 768px) {
  .contact-section {
    flex-direction: column;
  }
}
</style>
</head>

  <div class="top-bar">
    <nav>
